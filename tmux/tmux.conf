# 前缀键 Ctrl+a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ============================================
# 基础设置
# ============================================

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -sg escape-time 10
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ============================================
# ★ 鼠标 + 复制（兼容 tmux 3.0）★
#
# 鼠标拖选 → 限制在当前 pane → 松手自动复制到系统剪贴板
# Ctrl+a [ → 进入 copy-mode, v 选择, y 复制
# ============================================

set -g mouse on
setw -g mode-keys vi

set -s set-clipboard on

# 确保 tmux 内能访问 DISPLAY（解决 tmux server 启动时未继承的问题）
set -ga update-environment "DISPLAY"

# vi 风格选择和复制
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "~/.tmux-copy.sh"

# ★ 鼠标拖选松手 → 复制到系统剪贴板，不退出 copy mode（不跳到底部）
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "~/.tmux-copy.sh"

# ============================================
# 分屏（保持当前路径）
# ============================================

bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

# ============================================
# Pane 导航
# ============================================

bind-key -n M-Left  select-pane -L
bind-key -n M-Right select-pane -R
bind-key -n M-Up    select-pane -U
bind-key -n M-Down  select-pane -D

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# ============================================
# Pane 调整大小（前缀 + HJKL）
# ============================================

bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# ============================================
# 常用操作
# ============================================

bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ============================================
# 状态栏
# ============================================

set -g status-position bottom
set -g status-style "bg=colour235,fg=colour248"
set -g status-left-length 30
set -g status-right-length 60
set -g status-left " #[fg=colour46,bold]#S #[fg=colour248]| "
set -g status-right " %Y-%m-%d %H:%M "
setw -g window-status-current-style "fg=colour46,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour46"

# ============================================
# URL 提取（Ctrl+a u）
# ============================================

bind-key u run-shell -b "~/.tmux-url.sh"
